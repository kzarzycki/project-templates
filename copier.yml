_templates_suffix: .jinja
_answers_file: .copier-answers.yml
_subdirectory: "templates/{{ project_type }}"
_envops:
  keep_trailing_newline: true

# ---- Always asked ----
project_name:
  type: str
  help: Project name (kebab-case, e.g. my-cool-tool)

project_type:
  type: str
  help: Which project type?
  choices:
    Python service / library:   software/python
    Node / TypeScript:          software/node
    Java / JVM:                 software/java
    dbt project:                data/dbt
    Docs / research / markdown: authoring/content
    Claude Code skills:         ai/skills
    MCP server:                 ai/mcp
    Infrastructure (Terraform): infra/terraform

# ---- Shown only for parametric leaves (ai/mcp can sit on either toolchain) ----
language:
  type: str
  help: Which language toolchain?
  choices: [python, node]
  when: "{{ project_type == 'ai/mcp' }}"
  default: python

# ---- Optionals (bootstrap fills author/email from git) ----
description:
  type: str
  default: "A new {{ project_type }} project."

author:
  type: str
  default: "Your Name"
  help: Author (bootstrap injects this from `git config user.name`)

email:
  type: str
  default: "you@example.com"
  help: Author email (bootstrap injects this from `git config user.email`)

license:
  type: str
  default: MIT
  choices: [MIT, Apache-2.0, none]

include_mise:
  type: bool
  default: true
  help: Add a mise.toml pinning the runtime + bootstrap tools?

python_version:
  type: str
  default: "3.14"
  when: "{{ project_type == 'software/python' or (project_type == 'ai/mcp' and language == 'python') }}"

node_version:
  type: str
  default: "24"
  when: "{{ project_type == 'software/node' or (project_type == 'ai/mcp' and language == 'node') }}"

java_version:
  type: str
  default: "21"
  when: "{{ project_type == 'software/java' }}"

terraform_version:
  type: str
  default: "1.13.5"
  when: "{{ project_type == 'infra/terraform' }}"

include_example:
  type: bool
  default: true
  when: "{{ project_type == 'infra/terraform' }}"
  help: Include a starter main.tf / versions.tf? Turn off when adopting into an existing repo.

# ---- Computed (not asked) ----
module_name:
  type: str
  when: false
  default: "{{ project_name | lower | replace('-', '_') | replace(' ', '_') }}"

year:
  type: str
  when: false
  default: "2026"

_exclude:
  - "*.pyc"
  - "__pycache__"
  - "copier.yml"
  - "_post_gen.sh"
  - "{% if license == 'none' %}LICENSE{% endif %}"
  - "{% if not include_mise %}mise.toml{% endif %}"
  - "{% if not include_example %}main.tf{% endif %}"
  - "{% if not include_example %}versions.tf{% endif %}"

_tasks:
  - "bash '{{ _copier_conf.src_path }}/_post_gen.sh' '{{ project_type }}' '{{ language | default('', true) }}'"
