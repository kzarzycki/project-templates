_subdirectory: new-project
_templates_suffix: .jinja
_answers_file: .copier-answers.yml
_envops:
  keep_trailing_newline: true

# ---- Always asked ----
project_name:
  type: str
  help: Project name (kebab-case, e.g. my-cool-tool)

language:
  type: str
  help: Primary language / project type
  choices:
    "Python — uv + ruff + pytest": python
    "Node / TypeScript — npm + biome + vitest": node
    "Content / docs — markdown only": content

# ---- Optionals (sensible defaults; bootstrap.sh fills author/email/year from git) ----
description:
  type: str
  default: "A new {{ language }} project."

author:
  type: str
  default: "Your Name"
  help: Author (bootstrap.sh injects this from `git config user.name`)

email:
  type: str
  default: "you@example.com"
  help: Author email (bootstrap.sh injects this from `git config user.email`)

license:
  type: str
  default: MIT
  choices: [MIT, Apache-2.0, none]

python_version:
  type: str
  default: "3.12"
  when: "{{ language == 'python' }}"

node_version:
  type: str
  default: "24"
  when: "{{ language == 'node' }}"

include_docker:
  type: bool
  default: false
  help: Add a Dockerfile and a hadolint pre-commit hook?

include_release_please:
  type: bool
  default: false
  help: Add release-please (conventional-commit driven releases)?

# ---- Computed (not asked) ----
module_name:
  type: str
  when: false
  default: "{{ project_name | lower | replace('-', '_') | replace(' ', '_') }}"

year:
  type: str
  when: false
  default: "2026"

# ---- Render control ----
_exclude:
  - "*.pyc"
  - "__pycache__"
  - "copier.yml"
  - "_post_gen.sh"
  - "{% if license == 'none' %}LICENSE{% endif %}"
  # optional features
  - "{% if not include_docker %}Dockerfile{% endif %}"
  - "{% if not include_release_please %}release-please-config.json{% endif %}"
  - "{% if not include_release_please %}.release-please-manifest.json{% endif %}"
  - "{% if not include_release_please %}.github/workflows/release-please.yml{% endif %}"
  # python pack
  - "{% if language != 'python' %}pyproject.toml{% endif %}"
  - "{% if language != 'python' %}src/{{ module_name }}{% endif %}"
  - "{% if language != 'python' %}tests/test_smoke.py{% endif %}"
  # node pack
  - "{% if language != 'node' %}package.json{% endif %}"
  - "{% if language != 'node' %}tsconfig.json{% endif %}"
  - "{% if language != 'node' %}biome.json{% endif %}"
  - "{% if language != 'node' %}src/index.ts{% endif %}"
  - "{% if language != 'node' %}tests/smoke.test.ts{% endif %}"
  # content pack
  - "{% if language != 'content' %}.markdownlint.jsonc{% endif %}"
  - "{% if language != 'content' %}docs{% endif %}"

_tasks:
  - "bash '{{ _copier_conf.src_path }}/_post_gen.sh' '{{ language }}' '{{ include_release_please }}'"
